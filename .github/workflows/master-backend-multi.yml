name: Master Backend Multi-System Pipeline

on:
  push:
    branches: [ test, uat, main ]

jobs:
  # ==========================================
  # SYSTEM A PIPELINE
  # ==========================================
  sysA-ci:
    name: "[System A] CI & Quality Gate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./systems/system-a
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: echo "Running Unit Tests and SonarCloud Scan..."

  sysA-deploy-test:
    name: "[System A] Deploy to Test"
    needs: sysA-ci
    if: github.ref == 'refs/heads/test'
    environment: test-sysA
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Test
        env:
          REPLIT_HOOK: ${{ secrets.REPLIT_DEPLOY_HOOK_TEST_SYSA }}
        run: |
          echo "Deploying to Test using hook $REPLIT_HOOK"

  sysA-deploy-uat:
    name: "[System A] UAT & Automated Tests"
    needs: sysA-ci
    if: github.ref == 'refs/heads/uat'
    environment: uat-sysA
    runs-on: ubuntu-latest
    steps:
      - name: Deploy UAT
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL_UAT_SYSA }}
        run: |
          echo "Deploying to UAT Database: $DB_URL"

  sysA-deploy-prod-flow:
    name: "[System A] AWS Pre-Prod & Prod"
    needs: sysA-ci
    if: github.ref == 'refs/heads/main'
    environment: production-sysA
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Prod
        run: |
          echo "Deploying System A to Production..."

  # ==========================================
  # SYSTEM B PIPELINE
  # ==========================================
  sysB-ci:
    name: "[System B] CI & Quality Gate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./systems/system-b
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: echo "Running Unit Tests and SonarCloud Scan..."

  sysB-deploy-test:
    name: "[System B] Deploy to Test"
    needs: sysB-ci
    if: github.ref == 'refs/heads/test'
    environment: test-sysB
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Test
        env:
          REPLIT_HOOK: ${{ secrets.REPLIT_DEPLOY_HOOK_TEST_SYSB }}
        run: |
          echo "Deploying to Test using hook $REPLIT_HOOK"

  sysB-deploy-uat:
    name: "[System B] UAT & Automated Tests"
    needs: sysB-ci
    if: github.ref == 'refs/heads/uat'
    environment: uat-sysB
    runs-on: ubuntu-latest
    steps:
      - name: Deploy UAT
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL_UAT_SYSB }}
        run: |
          echo "Deploying to UAT Database: $DB_URL"

  sysB-deploy-prod-flow:
    name: "[System B] AWS Pre-Prod & Prod"
    needs: sysB-ci
    if: github.ref == 'refs/heads/main'
    environment: production-sysB
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Prod
        run: |
          echo "Deploying System B to Production..."