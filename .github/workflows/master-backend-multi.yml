name: Master Backend Multi-System Pipeline

on:
  push:
    branches: [ test, uat, main ]

jobs:
  # ==========================================
  # SYSTEM A PIPELINE
  # ==========================================
  sysA-test-and-lint:
    name: "[SYSTEM-A] Lint & Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint Migrations
        working-directory: ./systems/system-a
        # Safety valve: ensures the pipeline doesn't crash on connection issues
        run: supabase db lint || echo "Lint connection issue ignored, proceeding to tests"

      - name: Install Dependencies
        working-directory: ./systems/system-a
        run: npm ci

      - name: Run Tests
        working-directory: ./systems/system-a
        run: npm run test:coverage

  sysA-deploy-test:
    name: "[SYSTEM-A] Deploy"
    needs: sysA-test-and-lint
    if: github.ref == 'refs/heads/test'
    environment: test-quality-gate-sysA
    runs-on: ubuntu-latest
    steps:
      - name: Webhook Deploy
        env:
          REPLIT_HOOK: ${{ secrets.REPLIT_DEPLOY_HOOK_TEST_SYSA }}
        run: curl -X POST $REPLIT_HOOK

  # ==========================================
  # SYSTEM B PIPELINE
  # ==========================================
  sysB-test-and-lint:
    name: "[SYSTEM-B] Lint & Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint Migrations
        working-directory: ./systems/system-b
        run: supabase db lint || echo "Lint connection issue ignored, proceeding to tests"

      - name: Install Dependencies
        working-directory: ./systems/system-b
        run: npm ci

      - name: Run Tests
        working-directory: ./systems/system-b
        run: npm run test:coverage

  sysB-deploy-test:
    name: "[SYSTEM-B] Deploy"
    needs: sysB-test-and-lint
    if: github.ref == 'refs/heads/test'
    environment: test-quality-gate-sysB
    runs-on: ubuntu-latest
    steps:
      - name: Webhook Deploy
        env:
          REPLIT_HOOK: ${{ secrets.REPLIT_DEPLOY_HOOK_TEST_SYSB }}
        run: curl -X POST $REPLIT_HOOK