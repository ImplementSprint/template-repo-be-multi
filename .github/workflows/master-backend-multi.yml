name: Master Backend Multi-System Pipeline

on:
  push:
    branches: [ test, uat, main ]

jobs:
  # ==========================================
  # SYSTEM A PIPELINE (Per Section 4.2)
  # ==========================================
  sysA-setup-cli:
    name: "[SYSTEM-A] Supabase Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Lint Migrations
        working-directory: ./systems/system-a
        # Added --local to prevent connection errors in CI
        run: supabase db lint --local

  sysA-test-backend:
    name: "[SYSTEM-A] Jest Tests"
    needs: sysA-setup-cli
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        working-directory: ./systems/system-a
        run: npm ci
      - name: Run Tests
        working-directory: ./systems/system-a
        run: npm run test:coverage

  sysA-deploy-test:
    name: "[SYSTEM-A] Deploy to Replit Test"
    needs: sysA-test-backend
    if: github.ref == 'refs/heads/test'
    environment: test-quality-gate-sysA
    runs-on: ubuntu-latest
    steps:
      - name: Webhook Deploy
        env:
          REPLIT_HOOK: ${{ secrets.REPLIT_DEPLOY_HOOK_TEST_SYSA }}
        run: |
          echo "Deploying System A to Replit via Hook..."
          curl -X POST $REPLIT_HOOK

  # ==========================================
  # SYSTEM B PIPELINE
  # ==========================================
  sysB-setup-cli:
    name: "[SYSTEM-B] Supabase Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Lint Migrations
        working-directory: ./systems/system-b
        # Added --local to prevent connection errors in CI
        run: supabase db lint --local

  sysB-test-backend:
    name: "[SYSTEM-B] Jest Tests"
    needs: sysB-setup-cli
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        working-directory: ./systems/system-b
        run: npm ci
      - name: Run Tests
        working-directory: ./systems/system-b
        run: npm run test:coverage

  sysB-deploy-test:
    name: "[SYSTEM-B] Deploy to Replit Test"
    needs: sysB-test-backend
    if: github.ref == 'refs/heads/test'
    environment: test-quality-gate-sysB
    runs-on: ubuntu-latest
    steps:
      - name: Webhook Deploy
        env:
          REPLIT_HOOK: ${{ secrets.REPLIT_DEPLOY_HOOK_TEST_SYSB }}
        run: |
          echo "Deploying System B to Replit via Hook..."
          curl -X POST $REPLIT_HOOK